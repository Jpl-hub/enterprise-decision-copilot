services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CORS_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4173:80"
